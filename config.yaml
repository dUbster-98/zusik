# 미국 매매 on/off — 미국 주식을 안 하는 사용자는 false 로 끈다(기본 true).
# false 면 미국 매수/매도·장전후 알림·USD 잔고조회·환율조회가 전부 비활성(KR/crypto 만 운용).
