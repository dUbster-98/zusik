external_reserve: 0
monthly_deposit:
  # 월 정기 적립 시뮬(원). 본인 값은 config.local.yaml 에서 설정(개인값).
  enabled: false
  amount: 0
trading_mode: auto
broker:
  # KIS 파생ETF 선택확인서 등록 여부. false면 인버스/레버리지/선물/커버드콜 ETF 제외.
  # 본인 계정이 파생ETF 승인됐으면 config.local.yaml 에서 true 로(인버스 헷지 활성화).
  derivative_etf_enabled: false

# CLI provider on/off (분석 속도 가속)
ai_providers:
  disable_codex: false

  # agy(Antigravity) — 구글 Gemini 계열 provider. `agy -p`(--print) 비대화형 모드로 봇이 호출.
  # ~/.local/bin/agy + ~/.gemini 로그인 필요. claude/codex 와 부하를 나눠 claude 과부하를 던다.
  disable_agy: false

  # claude 일시정지 — 이 시각(KST 'YYYY-MM-DD HH:MM') 전까지 claude(Anthropic) 호출 0.
  # 사용자 Claude(Max) 쿼터 보호용. 봇은 codex/agy/로컬 퀀트로만 매매. 시각 경과 시 자동 복귀
  # (재시작 불요). 끄려면 빈 문자열("") 로. 매매 안전망(급락/트레일링/하드스톱)은 로컬이라 무관.
  claude_pause_until: ""

  # LLM 전체 불가 시 메신저 알림 — 장중 1회만, 실제 설치된 provider만 지목. 끄려면 false.
  llm_health_alert: true

  # ── 로컬 LLM (Ollama) — API 비용/쿼터 0 ──
  # API 대형 LLM(claude/codex/agy) 대신 자체 머신의 로컬 모델로 분석을 돌리고 싶은
  # 사용자용. 기본 OFF — CLI 구독 운영자는 false 유지(영향 없음). 켜는 법: docs/LOCAL_LLM.md
  #   1) Ollama 설치 + `ollama pull qwen2.5:7b`
  #   2) local_enabled: true
  # 활성 시 저렴 티어(easy/medium/cheap_web/balanced)는 로컬을 우선 사용하고,
  # 중요 판단(hard/premium)은 Claude 우선·로컬은 폴백. 로컬 무응답이면 자동 비활성.
  local_enabled: false
  local_endpoint: "http://localhost:11434"   # Ollama HTTP 엔드포인트
  local_model: ""                             # 사용자가 환경에 맞게 직접 지정 (Ollama 에 받은 모델명). 비우면 비활성
  local_search_backend: "duckduckgo"          # duckduckgo | searxng | none (검색 결과 주입 = "검색 가능")
  local_searxng_url: "http://localhost:8888"  # searxng 백엔드일 때만 사용
  local_search_results: 4                     # 주입할 검색 결과 개수
  local_timeout: 120                          # CPU 추론은 느림 — 초 단위 타임아웃

# 균형 복구 (codex/agy 재로그인으로 부하 분산 회복 → AI 분석 정상화)
reports:
  # 효과 추적 baseline (hold-through·모델선택·whitelist 재설계 배포일).
  # 이 날짜 이후 신규 매도만으로 조기손절 비중↓·실현↑ 효과를 매 장마감 자동 리포트.
  fix_baseline_date: "2026-06-03"
  pre_market_enabled: true    # 장전 리포트 — 매매 반영O: _pre_market_buy_gate가 sentiment로
                              # 신규 매수 차단/확신도 하한 적용 (whitelist 우회). 복구.
  daily_enabled: false        # 장후 일일 리포트 — 매매 반영X (순수 Discord 보고용, 소비처 0).
                              # 가장 무거운 Claude 호출이라 비활성 유지 (실투자 영향 없음).
  claude_screener_enabled: true   # Claude 종목 선별 (sonnet) — 후보 풀에 반영. 복구.
                                  # auto_screener (MC + Vortex, Claude 미사용)와 병행

# 분석 동시화 — 복구: 3개 CLI(claude/codex/agy) 분산 회복으로 1→3.
# 동시 3종목 분석을 라운드로빈으로 분산 (원 기본값 4보다 약간 보수적).
analysis_max_workers: 3

# 아레나(가상 전략 경쟁) — 장 마감 중엔 스킵. 복구: 60→30분.
# 결과는 로그에 "현재 1등 전략"으로 표면화(어떤 전략 레짐이 실제로 이기는지 가시화).
arena:
  # 비활성: 1년 paper-trading 결과 에이전트 대다수 손실 → 의사결정 미사용.
  # 30분 스캔(전 종목 OHLCV+현재가 API + 6전략)이 안 쓰이는 모니터링에 낭비라 OFF.
  # 메커니즘은 유지 — 필요 시 true 로 재활성.
  enabled: false
  interval_minutes: 30

# 종목 선택 다양화/상황 적응 — RS 랭킹에 레짐·로테이션 틸트 적용.
selection:
  regime_adaptive: true    # 하락장(bear score↑)엔 저변동(방어) 종목, 상승장엔 모멘텀 우선
  regime_bear_gate: 0.40   # bear score 이 이상이면 방어(저변동) 틸트 적용
  regime_vol_weight: 1.5   # 하락장 변동성 페널티 강도
  rotation: true           # 최근 매도 종목 디프리오리타이즈 — 같은 테마 쏠림 방지(로테이션)
  rotation_penalty: 0.03   # 로테이션 페널티 (RS %p 환산)
  event_boost: 0.05        # 이벤트 로테이션: 장전 리포트에서 감지한 활성 수혜 섹터 종목 부스트(RS %p)

# 개장 급변동 대처: 개장 직후 시초 갭/스파이크 추격을 피하려 신규 매수 보류.
# 헷지·추가매수(피라미딩)·빠른진입(확인된 신호)은 제외. 보유 청산은 40초 빠른 익절이 관리.
open_guard:
  enabled: true
  delay_minutes: 5         # 개장 후 이 시간(분)까진 단순 신규 매수 보류 (KR 09:00 / US 22:30 KST 기준)

# 빠른 로컬 진입: 5분 run_once 사이 급등 돌파/과매도 반등을 추가 Claude 호출 없이 포착해 진입.
# 유니버스는 장전 LLM 선별+RS 게이트를, 매 진입은 _pre_market_buy_gate를 거치므로 전략적 AI는 이미 반영 —
# 여기선 돌파 순간의 실시간 Claude 호출만 생략. '단순 보류'가 아니라 오를 신호 확인 종목을 빠르게 잡음.
# _handle_buy의 모든 안전 게이트(현금/churn/추세/RSI>78 추격 차단) 통과, 매수 후 40초 빠른 익절이 보호.
fast_entry:
  enabled: true
  interval_seconds: 120    # 스캔 주기(초). 30 미만은 30으로 클램프
  max_new_per_scan: 1      # 스캔당 신규 진입 최대 종목 수 (과진입 방지)
  # 0.6→0.45: 돌파+거래량이 이미 확인된 상태면 모멘텀 바를 낮춰 더 많은 급등 포착.
  # 실데이터 A/B(2년 walk-forward, 49종목 KR+US): 0.45가 +4.63%p(최근 1년 +3.71%p) 우위 +
  # 다운사이드 불변(최악손실·-15%손절 횟수 동일) → 떨어지는 칼이 아닌 진짜 급등을 잡음. 변경 시 재검증.
  momentum_min: 0.45       # 급등 진입 모멘텀 점수 하한 (0~1, 높을수록 보수적)
  retry_throttle_sec: 600  # 같은 종목 재시도 최소 간격(초) — 신호 지속 종목 반복 매수 방지

# 적응형 파라미터
# 누적 손익률(pnl_pct) + drawdown(dd) 기반으로 분산/익절 강도 동적 조절.
# 우선순위: crisis > defensive > harvest > winning > normal (위에서부터 매칭)
adaptive:
  enabled: true
  states:
    - name: crisis      # dd ≤ -15%: 위기. 분산 강화 + 빠른 익절
      trigger: "dd<=-15"
      correlation: 0.60
      same_sector: 1
      cap: 0.06
      whitelist_cap: 0.10
      rsi_exit_min: 70
      rsi_exit_profit_min: 0.015
    - name: defensive   # dd ≤ -5%: 방어. 분산 회복
      trigger: "dd<=-5"
      correlation: 0.75
      same_sector: 2
      cap: 0.08
      whitelist_cap: 0.15
      rsi_exit_min: 75
      rsi_exit_profit_min: 0.02
    - name: harvest     # pnl ≥ +20%: 큰 수익. 이익 보호로 분산 다시 강화
      trigger: "pnl>=20"
      correlation: 0.75
      same_sector: 1
      cap: 0.08
      whitelist_cap: 0.15
      rsi_exit_min: 85
      rsi_exit_profit_min: 0.04
    - name: winning     # pnl ≥ +10%: 수익. 살짝 보수화
      trigger: "pnl>=10"
      correlation: 0.85
      same_sector: 2
      cap: 0.10
      whitelist_cap: 0.20
      rsi_exit_min: 85
      rsi_exit_profit_min: 0.05
    - name: normal      # 평소. 공격적
      trigger: "default"
      correlation: 0.90
      same_sector: 2
      cap: 0.14  # 일반 종목
      whitelist_cap: 0.25
      # B: 익절 임계 강화 (큰 추세 살림). RSI 80/3% → 85/5%
      rsi_exit_min: 85
      rsi_exit_profit_min: 0.05
screening:
  enabled: true
  # 종목 선택 방식 — monte_carlo(기본·MC 부트스트랩) | momentum(모멘텀) | trend(추세 정배열) | low_vol(저변동 방어).
  # MC 외 방식은 시뮬 없이 빨라 상황별로 골라 쓸 수 있다(예: 하락장 low_vol, 강세장 momentum).
  method: monte_carlo
  # 강 분산 모드: 종목당 5~10% × 15+8 = 약 100% 활용.
  # 파생 ETF 제외 후 실제 종목 수 보전 위해 kr_count 여유롭게.
  kr_count: 15
  us_count: 10
  # auto_screener.filter_top에 전달 — 단일주 최소 N개 슬롯 보장 (ETF만 차지 방지)
  min_single_stocks_kr: 6
  min_single_stocks_us: 4
  # whitelist: MC 점수와 무관하게 항상 후보에 포함 (사용자 핵심 종목)
  # 분산 핵심 바스켓 (7섹터 8종목). 반도체 쏠림 해소 — 코어 진입이 각 섹터
  # 대표주를 하한만큼 담아 분산. (blacklist NAVER/카카오 제외)
  whitelist_kr:
    - { code: "005930", name: "삼성전자" }              # 반도체
    # core_shares: 종목별 코어 목표 주수(비싼 핵심주 직접 지정). 하이닉스 2주 = 사용자 요청.
    - { code: "000660", name: "SK하이닉스", core_shares: 2 }  # 반도체
    - { code: "005380", name: "현대차" }               # 자동차
    - { code: "086790", name: "하나금융지주" }          # 금융
    - { code: "207940", name: "삼성바이오로직스" }       # 바이오
    - { code: "012450", name: "한화에어로스페이스" }     # 방산
    - { code: "051910", name: "LG화학" }               # 2차전지/화학
    - { code: "033780", name: "KT&G" }                # 디펜시브/소비재
  # 사용자 blacklist (구매 금지)
  blacklist_kr:
    - "035420"  # NAVER
    - "035720"  # 카카오
  whitelist_us:
    - { ticker: "NVDA", name: "NVIDIA", exchange: "NASD" }
    - { ticker: "AAPL", name: "Apple", exchange: "NASD" }
    - { ticker: "MSFT", name: "Microsoft", exchange: "NASD" }
  screen_interval_hours: 2  # 복구 (절감 시 6h → 원복 2h)
  # numpy 자동 스크리닝(감시종목 재랭킹) 주기. 일 1회→4h로 단축해 watch list가
  # 시장 변동을 따라가게. (현금 무관 재랭킹 — 고정 종목이 시장 흐름 무시하던 문제 해결.)
  auto_screen_interval_hours: 4
  crisis_interval_minutes: 30
  style: defensive
  preferred_sectors:
  - 메가캡 반도체
  - 디펜시브 (통신/유틸리티/소비재)
  - 헬스케어 대형주
  avoid:
  - 바이오 신약 임상 초기
  - 스팩
  - 적자 기업
  - 시총 작은 변동성 종목
  - 데드크로스/약세 추세 종목
  min_market_cap_kr: 5조
  min_market_cap_us: 50B
# 종목 풀 (5/1 재교체) — 시드 10만원 매칭 가능한 저가 우량주 + 인덱스 ETF.
# 메가캡 직매수는 1주도 못 사서 현금만 쌓이는 문제 해결.
# 원칙: 시총 5조+ 또는 분산 ETF, 주가 ≤ 5만원(KR) 또는 ≤ $60(US).
stocks:
# 인덱스 ETF (분산 + 낮은 변동성, 시드 10만원 매칭 OK)
- code: '102110'
  name: TIGER 200
